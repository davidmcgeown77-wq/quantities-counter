<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Quantities Counter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0c0c14;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:10px;-webkit-tap-highlight-color:transparent;min-height:100vh;}

/* HEADER */
.header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.header h1{flex:1;font-size:1.1rem;color:#a78bfa;letter-spacing:.3px;}
.share-btn{background:#1e1e2e;color:#a78bfa;border:1px solid #a78bfa55;border-radius:8px;padding:8px 12px;font-size:0.85rem;font-weight:bold;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;white-space:nowrap;}

/* JOB NAME */
#job-name{width:100%;background:#1a1a24;color:#fff;border:1px solid #2a2a3a;border-radius:8px;padding:10px 12px;font-size:1rem;margin-bottom:10px;outline:none;}
#job-name:focus{border-color:#6c63ff;}

/* GRAND TOTAL */
.grand-bar{background:linear-gradient(135deg,#1a1a2e,#12122a);border:2px solid #6c63ff44;border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.grand-left .glabel{font-size:0.72rem;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.grand-left .groom{font-size:0.85rem;color:#a78bfa;font-weight:600;}
.grand-right .gval{font-size:2rem;font-weight:bold;color:#a78bfa;line-height:1;}
.grand-right .gall{font-size:0.72rem;color:#555;text-align:right;margin-top:2px;}

/* ROOMS BAR */
.rooms-wrap{margin-bottom:8px;}
.rooms-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;align-items:center;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.rooms-scroll::-webkit-scrollbar{display:none;}
.new-room-btn{background:#6c63ff;color:#fff;border:none;border-radius:18px;padding:8px 14px;font-size:0.8rem;font-weight:bold;cursor:pointer;white-space:nowrap;touch-action:manipulation;-webkit-appearance:none;flex-shrink:0;}
.room-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:18px;border:2px solid #2a2a3a;background:#1a1a24;color:#aaa;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation;-webkit-appearance:none;flex-shrink:0;}
.room-pill.active{color:#fff;}
.room-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* ROOM CREATOR */
.room-creator{display:none;background:#1a1a28;border:1px solid #2a2a3a;border-radius:12px;padding:14px;margin-bottom:10px;}
.room-creator.open{display:block;}
.room-creator-title{font-size:0.8rem;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
#new-room-name{width:100%;background:#0c0c14;color:#fff;border:1px solid #333;border-radius:8px;padding:9px 12px;font-size:1rem;margin-bottom:12px;outline:none;}
#new-room-name:focus{border-color:#6c63ff;}
.colour-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.colour-swatch{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;touch-action:manipulation;-webkit-appearance:none;flex-shrink:0;transition:transform 0.1s;}
.colour-swatch.active{border-color:#fff;transform:scale(1.15);}
.room-create-btn{background:#6c63ff;color:#fff;border:none;border-radius:8px;padding:11px;font-size:0.95rem;font-weight:bold;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;width:100%;}

/* ITEMS LIST */
#items-list{margin-bottom:8px;}

/* ITEM ROW */
.item-row{display:flex;align-items:center;padding:8px 7px;border-radius:8px;margin-bottom:5px;background:#1a1a24;gap:5px;border-left:4px solid transparent;}
.row-num{font-size:0.7rem;color:#555;min-width:16px;text-align:center;flex-shrink:0;}
.drag-handle{color:#444;font-size:1rem;padding:2px 3px;cursor:grab;flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none;line-height:1;}
.item-label{flex:1;font-size:0.82rem;line-height:1.3;color:#ddd;word-break:break-word;min-width:0;}
.add-input{width:50px;background:#0c0c14;color:#fff;border:1px solid #333;border-radius:6px;padding:7px 3px;font-size:1rem;text-align:center;outline:none;-webkit-appearance:none;-moz-appearance:textfield;flex-shrink:0;}
.add-input::-webkit-inner-spin-button,.add-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.add-input:focus{border-color:#6c63ff;}
.add-btn{background:#6c63ff;color:#fff;border:none;border-radius:6px;padding:8px 9px;font-size:0.82rem;font-weight:bold;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;flex-shrink:0;user-select:none;-webkit-user-select:none;}
.add-btn:active{background:#5248c8;}
.total-box{background:#0c0c14;border:1px solid #2a2a3a;border-radius:6px;padding:7px 4px;min-width:36px;text-align:center;font-weight:bold;font-size:0.88rem;color:#4ade80;flex-shrink:0;}
.reset-row-btn{background:#1e1010;color:#e74c3c;border:1px solid #e74c3c33;border-radius:6px;padding:7px 7px;font-size:0.78rem;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;flex-shrink:0;line-height:1;}
.reset-row-btn:active{background:#2e1010;}

/* ADD NEW ITEM */
.add-item-bar{display:flex;gap:8px;margin-bottom:10px;}
.add-item-input{flex:1;background:#1a1a24;color:#fff;border:1px solid #2a2a3a;border-radius:8px;padding:10px 12px;font-size:0.95rem;outline:none;min-width:0;}
.add-item-input:focus{border-color:#2ecc71;}
.add-item-btn{background:#2ecc71;color:#0c0c14;border:none;border-radius:8px;padding:10px 14px;font-size:0.88rem;font-weight:bold;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;white-space:nowrap;flex-shrink:0;}

/* FOOTER */
.footer{text-align:center;padding:8px 0 24px;}
.reset-all-btn{background:#1e0f0f;color:#e74c3c;border:1px solid #e74c3c44;border-radius:10px;padding:12px 28px;font-size:0.88rem;font-weight:bold;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;}

/* PRINT */
@media print {
  body{background:#fff!important;color:#000!important;padding:6px;}
  .header .share-btn,.rooms-wrap,.room-creator,.add-item-bar,.footer,.drag-handle,.add-btn,.add-input,.reset-row-btn,.new-room-btn{display:none!important;}
  .item-row{background:#f5f5f5!important;border:1px solid #ccc!important;page-break-inside:avoid;margin-bottom:3px;}
  .item-label,.row-num{color:#000!important;}
  .total-box{color:#000!important;background:#e8f5e9!important;border-color:#aaa!important;}
  .grand-bar{background:#f0f0f0!important;border:2px solid #333!important;}
  .grand-left .glabel,.grand-left .groom,.grand-right .gall{color:#333!important;}
  .grand-right .gval{color:#111!important;font-size:1.5rem!important;}
}
</style>
</head>
<body>

<div class="header">
  <h1>📦 Quantities Counter</h1>
  <button class="share-btn" onclick="sharePrint()">🖨 Share</button>
</div>

<input type="text" id="job-name" placeholder="Job name..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="S.job=this.value;save()" />

<div class="grand-bar">
  <div class="grand-left">
    <div class="glabel">Room Total</div>
    <div class="groom" id="current-room-label">— no room —</div>
  </div>
  <div class="grand-right">
    <div class="gval" id="grand-total">0</div>
    <div class="gall" id="all-rooms-total"></div>
  </div>
</div>

<div class="rooms-wrap">
  <div class="rooms-scroll" id="rooms-scroll">
    <button class="new-room-btn" onclick="toggleCreator()">+ New Room</button>
  </div>
</div>

<div class="room-creator" id="room-creator">
  <div class="room-creator-title">New Room</div>
  <input type="text" id="new-room-name" placeholder="Room name (e.g. Office 1)..." autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <div class="colour-grid" id="colour-grid"></div>
  <button class="room-create-btn" onclick="createRoom()">✓ Create Room</button>
</div>

<div id="items-list"></div>

<div class="add-item-bar">
  <input type="text" id="new-item-input" placeholder="Add new item..." autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
  <button class="add-item-btn" onclick="addNewItem()">+ Add</button>
</div>

<div class="footer">
  <button class="reset-all-btn" onclick="resetAll()">🗑 Reset All</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
// ── DEFAULT ITEMS ──────────────────────────────────────────
const DEFAULTS = [
  'Cantilever big','Cantilever small','3" trunking','3" trunking bend','3" suspension rod',
  '2" trunking','2" trunking bend','3" end cap','2" end cap','2" lighting trunking',
  '2" lighting trunking rod suspensions','2" lighting trunking standoff','All conduit bends',
  'Conduit lighting','Conduit heating','Conduit sockets',
  'External flood / emergency bulkhead conduit pass through',
  'Thorn 5ft','Thorn 4ft','LED panel','Bulkhead','Emergency bulkhead',
  'Maintained emergency bulkhead','Flood light','Single socket','Double socket',
  'Fused spur','Isolator / local switch','Thermostat',
  'Dimplex 3kw','Dimplex 2kw','Dimplex 1.5kw',
  'Smoke detector','Heat detector','Bell / sounder','Call point','Fire panel'
];

const COLOURS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#00bcd4','#ff9800'
];

// ── STATE ──────────────────────────────────────────────────
let S = {
  job: '',
  rooms: [],           // [{id,name,color,totals:{rowId:n}}]
  currentRoomId: null,
  rowOrder: [],        // ordered array of all active row IDs
  customRows: {},      // {rowId: 'label'}
  deletedDefaults: []  // ['r3','r5',...]
};
let pickerColour = COLOURS[0];
let nextRoomSeq = 1;
let nextCustomSeq = 200;

// ── HELPERS ────────────────────────────────────────────────
function room() { return S.rooms.find(r => r.id === S.currentRoomId) || null; }
function getTotal(rowId) { const r = room(); return r ? (r.totals[rowId]||0) : 0; }
function getLabel(rowId) {
  if (rowId in S.customRows) return S.customRows[rowId];
  const n = parseInt(rowId.slice(1)) - 1;
  return DEFAULTS[n] || '';
}
function hex2rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function activeRowIds() {
  const base = DEFAULTS.map((_,i)=>'r'+(i+1)).filter(id=>!S.deletedDefaults.includes(id));
  const custom = Object.keys(S.customRows);
  const all = [...base,...custom];
  const ordered = S.rowOrder.filter(id=>all.includes(id));
  const missing = all.filter(id=>!ordered.includes(id));
  return [...ordered,...missing];
}
function allRoomsTotal() {
  const ids = activeRowIds();
  return S.rooms.reduce((sum,r)=>sum+ids.reduce((s,id)=>s+(r.totals[id]||0),0),0);
}

// ── RENDER ─────────────────────────────────────────────────
function render() {
  const ids = activeRowIds();
  const rm = room();
  const html = ids.map((id,i) => {
    const total = getTotal(id);
    const label = getLabel(id);
    let bg = '#1a1a24', bl = 'transparent';
    if (rm && total > 0) { bg = hex2rgba(rm.color,0.2); bl = rm.color; }
    return `<form class="item-row" id="${id}" data-id="${id}" onsubmit="addQty(this,'${id}');return false" style="background:${bg};border-left-color:${bl}">
  <span class="row-num">${i+1}</span>
  <span class="drag-handle">⠿</span>
  <span class="item-label">${esc(label)}</span>
  <input type="number" class="add-input" placeholder="0" min="0" step="1" inputmode="numeric" autocomplete="off">
  <button type="submit" class="add-btn">Add</button>
  <div class="total-box">${total}</div>
  <button type="button" class="reset-row-btn" onclick="resetRow('${id}')">↺</button>
</form>`;
  }).join('');
  document.getElementById('items-list').innerHTML = html;
  updateTotals();
  initSortable();
}

function renderRooms() {
  const pills = S.rooms.map(r => {
    const active = r.id === S.currentRoomId;
    const border = active ? `border-color:${r.color};` : '';
    const col = active ? `color:#fff;` : '';
    return `<button class="room-pill${active?' active':''}" style="${border}${col}" onclick="selectRoom('${r.id}')"><span class="room-dot" style="background:${r.color}"></span>${esc(r.name)}</button>`;
  }).join('');
  document.getElementById('rooms-scroll').innerHTML =
    `<button class="new-room-btn" onclick="toggleCreator()">+ New Room</button>${pills}`;
}

function renderColourGrid() {
  document.getElementById('colour-grid').innerHTML = COLOURS.map(c =>
    `<div class="colour-swatch${c===pickerColour?' active':''}" style="background:${c}" onclick="pickColour('${c}',this)"></div>`
  ).join('');
}

function updateTotals() {
  const ids = activeRowIds();
  let sum = 0;
  ids.forEach(id => { sum += getTotal(id); });
  document.getElementById('grand-total').textContent = sum;
  const rm = room();
  document.getElementById('current-room-label').textContent = rm ? rm.name : '— no room —';
  const art = allRoomsTotal();
  const el = document.getElementById('all-rooms-total');
  el.textContent = S.rooms.length > 1 ? 'All rooms: '+art : '';
}

function updateRowNumbers() {
  document.querySelectorAll('.item-row[data-id]').forEach((f,i) => {
    const n = f.querySelector('.row-num');
    if (n) n.textContent = i+1;
  });
}

function initSortable() {
  const list = document.getElementById('items-list');
  if (list._sortable) { try { list._sortable.destroy(); } catch(e){} }
  if (typeof Sortable !== 'undefined') {
    list._sortable = Sortable.create(list, {
      handle: '.drag-handle',
      animation: 150,
      onEnd: function() {
        S.rowOrder = Array.from(list.querySelectorAll('.item-row[data-id]')).map(f=>f.dataset.id);
        updateRowNumbers();
        save();
      }
    });
  }
}

// ── ACTIONS ────────────────────────────────────────────────
function addQty(form, rowId) {
  const input = form.querySelector('.add-input');
  const val = parseInt(input.value, 10);
  input.value = '';
  input.blur();
  if (isNaN(val) || val <= 0) return false;
  if (!S.currentRoomId) { alert('Please create or select a room first.'); return false; }
  const rm = room();
  if (!rm.totals) rm.totals = {};
  rm.totals[rowId] = (rm.totals[rowId]||0) + val;
  // update row in-place (no full re-render)
  const tb = form.querySelector('.total-box');
  if (tb) tb.textContent = rm.totals[rowId];
  form.style.background = hex2rgba(rm.color,0.2);
  form.style.borderLeftColor = rm.color;
  updateTotals();
  save();
  return false;
}

function resetRow(rowId) {
  const rm = room();
  if (!rm) return;
  rm.totals[rowId] = 0;
  const form = document.getElementById(rowId);
  if (form) {
    form.querySelector('.total-box').textContent = '0';
    form.style.background = '#1a1a24';
    form.style.borderLeftColor = 'transparent';
  }
  updateTotals();
  save();
}

function selectRoom(roomId) {
  S.currentRoomId = roomId;
  renderRooms();
  render();
  save();
}

function toggleCreator() {
  const c = document.getElementById('room-creator');
  c.classList.toggle('open');
  if (c.classList.contains('open')) {
    renderColourGrid();
    setTimeout(()=>{ document.getElementById('new-room-name').focus(); }, 50);
  }
}

function pickColour(colour, el) {
  pickerColour = colour;
  document.querySelectorAll('.colour-swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
}

function createRoom() {
  const nameEl = document.getElementById('new-room-name');
  const name = nameEl.value.trim() || ('Room ' + nextRoomSeq);
  const id = 'rm' + Date.now();
  S.rooms.push({ id, name, color: pickerColour, totals: {} });
  S.currentRoomId = id;
  nextRoomSeq++;
  nameEl.value = '';
  document.getElementById('room-creator').classList.remove('open');
  // pick next unused colour for next room
  const usedColours = S.rooms.map(r=>r.color);
  const nextCol = COLOURS.find(c=>!usedColours.includes(c));
  if (nextCol) pickerColour = nextCol;
  renderRooms();
  render();
  save();
}

function addNewItem() {
  const input = document.getElementById('new-item-input');
  const label = input.value.trim();
  if (!label) return;
  const id = 'c' + (nextCustomSeq++);
  S.customRows[id] = label;
  if (!S.rowOrder.includes(id)) S.rowOrder.push(id);
  input.value = '';
  render();
  save();
}

function resetAll() {
  if (!confirm('Reset everything — all rooms, all totals, job name?')) return;
  S = { job:'', rooms:[], currentRoomId:null,
        rowOrder:DEFAULTS.map((_,i)=>'r'+(i+1)), customRows:{}, deletedDefaults:[] };
  nextRoomSeq = 1; nextCustomSeq = 200; pickerColour = COLOURS[0];
  document.getElementById('job-name').value = '';
  document.getElementById('room-creator').classList.remove('open');
  renderRooms();
  render();
  save();
}

function sharePrint() {
  if (navigator.share) {
    navigator.share({ title: document.getElementById('job-name').value || 'Quantities', url: location.href })
      .catch(()=>window.print());
  } else {
    window.print();
  }
}

// ── PERSISTENCE ────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('qcv4', JSON.stringify({
      job:S.job, rooms:S.rooms, currentRoomId:S.currentRoomId,
      rowOrder:S.rowOrder, customRows:S.customRows, deletedDefaults:S.deletedDefaults,
      nextRoomSeq, nextCustomSeq, pickerColour
    }));
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem('qcv4');
    if (raw) {
      const d = JSON.parse(raw);
      S.job = d.job||'';
      S.rooms = d.rooms||[];
      S.currentRoomId = d.currentRoomId||null;
      S.rowOrder = d.rowOrder||[];
      S.customRows = d.customRows||{};
      S.deletedDefaults = d.deletedDefaults||[];
      if (d.nextRoomSeq) nextRoomSeq = d.nextRoomSeq;
      if (d.nextCustomSeq) nextCustomSeq = d.nextCustomSeq;
      if (d.pickerColour) pickerColour = d.pickerColour;
      document.getElementById('job-name').value = S.job;
    }
  } catch(e) {}
  // ensure all defaults are in rowOrder
  DEFAULTS.forEach((_,i)=>{
    const id='r'+(i+1);
    if (!S.deletedDefaults.includes(id) && !S.rowOrder.includes(id)) S.rowOrder.push(id);
  });
  renderRooms();
  render();
}

document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
